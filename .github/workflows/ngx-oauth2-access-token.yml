name: Create and publish ngx-oauth2-access-token

on:
  release:
    types: [published]

jobs:
  check-tag:
    runs-on: ubuntu-latest
    outputs:
      is_match: ${{ steps.regex.outputs.match }}
    steps:
      - name: Regex check
        id: regex
        run: |
          if [[ "${{ github.event.release.tag_name }}" =~ ^ngx-oauth2-access-token/release/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "match=true" >> $GITHUB_OUTPUT
          else
            echo "match=false" >> $GITHUB_OUTPUT
          fi
  build-and-release-package:
    needs: check-tag
    if: needs.check-tag.outputs.is_match == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      PACKAGE_SCOPE: mrpachara
      PACKAGE_NAME: ngx-oauth2-access-token
    steps:
      - uses: actions/checkout@v4
      # Setup .npmrc file to publish to GitHub Packages
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'yarn'
          registry-url: https://npm.pkg.github.com
      - name: Install dependcies
        run: yarn install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build package
        run: |
          npx ng build @$PACKAGE_SCOPE/$PACKAGE_NAME -c production
          cp LICENSE ./dist/$PACKAGE_SCOPE/$PACKAGE_NAME
      - name: Publish package
        working-directory: ./dist/${{ env.PACKAGE_SCOPE }}/${{ env.PACKAGE_NAME }}
        run: yarn publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
