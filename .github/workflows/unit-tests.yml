name: Unit Tests

on:
  pull_request:
    # Triggers on PR creation and every subsequent commit pushed to that PR
    types: [opened, synchronize, reopened]
    branches:
      - main # Only run for PRs targeting the main branch

jobs:
  unit-test:
    name: 'ngx: unit test'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: |
          mkdir -p test-results

          # Using jq to extract project names with a test target
          for project in $(jq -r '.projects | to_entries[] | select(.value.architect.test) | .key' angular.json); do
            safe_name=$(echo "$project" | tr '/' '-')

            echo "Running tests for $project..."
            npx ng test "$project" --watch=false --reporters=junit --output-file="./test-results/$safe_name.xml"
          done

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() # Run even if tests fail
        with:
          files: 'test-results/*.xml' # Pattern to find your test results
